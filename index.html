<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>ValidateAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
/* ══════════════ VARIABLES ══════════════ */
:root{
  --bg:#050605;--surface:#0b130e;--surface-2:#0d1a12;--border:#0f3b22;
  --text:#e7f2ea;--muted:#92a59a;--dim:#4a5e50;--accent:#00ff6a;
  --accent-dim:#00aa44;--accent-muted:rgba(0,255,106,.12);
  --danger:#ff453a;--danger-muted:rgba(255,69,58,.12);
  --warn:#ffcc00;--warn-muted:rgba(255,204,0,.12);
  --blue:#4488ff;--blue-muted:rgba(68,136,255,.12);
  --purple:#9966ff;--purple-muted:rgba(153,102,255,.12);
  --orange:#ff8844;--orange-muted:rgba(255,136,68,.12);
  --tap:48px;--radius:14px;--radius-sm:10px;
  --gap:16px;--gap-sm:10px;
  --nav-h:68px;--topbar-h:56px;
  --fs-xs:12px;--fs-sm:14px;--fs-md:clamp(15px,2.5vw,18px);
  --fs-lg:clamp(17px,3vw,22px);--fs-xl:clamp(20px,3.5vw,26px);
  --lh:1.5;--kb-inset:0px;
  --mono:"Space Mono",monospace;--sans:"Inter Tight",sans-serif;
}

/* ══════════════ RESET ══════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{height:100dvh;height:100vh;background:var(--bg);color:var(--text);
  font:var(--fs-sm)/var(--lh) var(--sans);-webkit-tap-highlight-color:transparent;overflow:hidden}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit;
  -webkit-tap-highlight-color:transparent}
input{font:inherit;color:inherit;background:none;border:none;outline:none}

/* ══════════════ SHELL ══════════════ */
#app{display:flex;flex-direction:column;height:100dvh;height:100vh}
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--gap);background:var(--bg);border-bottom:1px solid var(--border);z-index:90}
.topbar-title{font:700 var(--fs-lg)/1 var(--mono);letter-spacing:1px}
.conn-pill{display:flex;align-items:center;gap:6px;font:400 var(--fs-xs)/1 var(--mono);
  color:var(--muted);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.conn-dot.err{background:var(--danger)}

#content{flex:1;overflow-y:auto;overflow-x:hidden;
  padding:calc(var(--topbar-h) + var(--gap-sm)) var(--gap) calc(var(--nav-h) + var(--gap-sm) + var(--kb-inset));
  -webkit-overflow-scrolling:touch}
.page{display:none}.page.active{display:block}

/* ══════════════ NAV ══════════════ */
#nav{position:fixed;bottom:var(--kb-inset);left:0;right:0;height:var(--nav-h);
  display:flex;background:var(--bg);border-top:1px solid var(--border);z-index:90}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;min-height:var(--nav-h);font:400 var(--fs-xs)/1 var(--mono);letter-spacing:.5px;
  color:var(--dim);transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:20px}

/* ══════════════ SECTION HEADERS ══════════════ */
.sh{display:flex;align-items:center;gap:8px;padding:var(--gap) 0 var(--gap-sm)}
.sh-t{font:700 var(--fs-sm)/1 var(--mono);letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.sh-line{flex:1;height:1px;background:var(--border)}
.sh-badge{font:700 var(--fs-xs)/1 var(--mono);color:var(--dim)}

/* ══════════════ BADGES ══════════════ */
.b{display:inline-flex;align-items:center;font:700 10px/1 var(--mono);
  padding:3px 7px;border-radius:4px;letter-spacing:.3px;white-space:nowrap;vertical-align:middle}
.b-high{background:var(--accent-muted);color:var(--accent)}
.b-med{background:var(--warn-muted);color:var(--warn)}
.b-low{background:rgba(255,255,255,.05);color:var(--dim)}
.b-commit{background:var(--warn-muted);color:var(--warn)}
.b-decision{background:var(--blue-muted);color:var(--blue)}
.b-entity{background:var(--purple-muted);color:var(--purple)}
.b-pinned{background:var(--accent-muted);color:var(--accent)}
.b-contra{background:var(--danger-muted);color:var(--danger)}
.b-person{background:var(--blue-muted);color:var(--blue)}
.b-date{background:var(--orange-muted);color:var(--orange)}
.b-number{background:var(--purple-muted);color:var(--purple)}
.b-place{background:var(--accent-muted);color:var(--accent-dim)}
.b-org{background:var(--danger-muted);color:var(--danger)}

/* ══════════════ CARDS ══════════════ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:var(--gap);margin-bottom:var(--gap-sm)}

/* ══════════════ NOW: STATUS ══════════════ */
.status-card{display:flex;align-items:center;justify-content:space-between;
  min-height:60px;cursor:pointer}
.status-left{display:flex;align-items:center;gap:10px}
.status-dot{width:12px;height:12px;border-radius:50%;background:var(--accent);flex-shrink:0}
.status-dot.idle{background:var(--dim)}
.status-dot.live{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--accent-muted)}50%{box-shadow:0 0 0 10px transparent}}
.status-text{font:700 var(--fs-xl)/1 var(--mono);color:var(--accent);letter-spacing:1px}
.status-text.idle{color:var(--dim)}
.status-timer{font:400 var(--fs-md)/1 var(--mono);color:var(--dim)}

/* ══════════════ NOW: KPI GRID ══════════════ */
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap-sm);margin-bottom:var(--gap)}
.kpi-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:14px 12px;min-height:80px;display:flex;flex-direction:column;justify-content:center}
.kpi-n{font:700 var(--fs-xl)/1 var(--mono);color:var(--accent)}
.kpi-l{font:400 var(--fs-xs)/1 var(--mono);color:var(--dim);letter-spacing:1px;margin-top:6px}

/* ══════════════ NOW: ANALYZER CHIPS ══════════════ */
.chips-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;
  -ms-overflow-style:none;margin-bottom:var(--gap)}
.chips-scroll::-webkit-scrollbar{display:none}
.achip{font:400 var(--fs-sm)/1 var(--mono);white-space:nowrap;padding:0 16px;
  min-height:44px;display:flex;align-items:center;border-radius:22px;
  border:1px solid var(--border);color:var(--dim);transition:all .12s;flex-shrink:0}
.achip.on{background:var(--accent-muted);border-color:var(--accent-dim);color:var(--accent-dim)}
.achip:active{opacity:.6}

/* ══════════════ FEED ITEMS ══════════════ */
.feed{display:flex;flex-direction:column;gap:2px}
.fi{display:flex;gap:10px;padding:var(--gap);min-height:72px;
  background:var(--surface);border-radius:var(--radius-sm);
  border-left:3px solid var(--border);cursor:pointer;transition:background .1s}
.fi:active{background:var(--surface-2)}
.fi.alert{border-left-color:var(--danger)}
.fi.card-t{border-left-color:var(--accent)}
.fi.passive{border-left-color:var(--dim)}
.fi-content{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.fi-title{font:600 var(--fs-md)/1.3 var(--sans);color:var(--text)}
.fi-summary{font:400 var(--fs-sm)/1.4 var(--sans);color:var(--muted);margin-top:3px;
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.fi-meta{font:400 var(--fs-xs)/1 var(--mono);color:var(--dim);margin-top:6px;display:flex;gap:8px;align-items:center}

/* ══════════════ FAB ══════════════ */
.fab{position:fixed;right:var(--gap);bottom:calc(var(--nav-h) + var(--gap) + var(--kb-inset));
  height:52px;padding:0 24px;display:flex;align-items:center;gap:8px;
  background:var(--accent);color:var(--bg);font:700 var(--fs-sm)/1 var(--mono);letter-spacing:1px;
  border-radius:26px;box-shadow:0 4px 20px rgba(0,255,106,.25);z-index:80;transition:transform .1s}
.fab:active{transform:scale(.95)}

/* ══════════════ LIBRARY: SEARCH ══════════════ */
.search-bar{position:sticky;top:0;z-index:10;padding-bottom:var(--gap-sm);background:var(--bg)}
.search-wrap{position:relative}
.search{width:100%;min-height:52px;font:400 var(--fs-md)/1 var(--mono);
  padding:0 44px 0 16px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text)}
.search::placeholder{color:var(--dim)}
.search:focus{border-color:var(--accent-dim)}
.search-x{position:absolute;right:0;top:0;width:48px;height:100%;display:none;
  align-items:center;justify-content:center;font-size:20px;color:var(--muted)}
.search-x.show{display:flex}
.filters{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:var(--gap-sm)}
.filters::-webkit-scrollbar{display:none}
.fchip{font:400 var(--fs-sm)/1 var(--mono);white-space:nowrap;padding:0 16px;
  min-height:44px;display:flex;align-items:center;border-radius:22px;
  border:1px solid var(--border);color:var(--dim);flex-shrink:0;transition:all .12s}
.fchip.active{background:var(--accent-muted);border-color:var(--accent-dim);color:var(--accent)}

/* ══════════════ LIBRARY: LIST ITEMS ══════════════ */
.ml{display:flex;gap:10px;padding:var(--gap);min-height:72px;
  background:var(--surface);border-radius:var(--radius-sm);margin-bottom:2px;
  cursor:pointer;transition:background .1s;align-items:flex-start}
.ml:active{background:var(--surface-2)}
.ml-body{flex:1;min-width:0}
.ml-text{font:500 var(--fs-md)/1.4 var(--sans);color:var(--text);
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.ml-meta{font:400 var(--fs-xs)/1 var(--mono);color:var(--dim);margin-top:6px;
  display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.ml-due{color:var(--orange)}

/* ══════════════ EMPTY STATE ══════════════ */
.empty{text-align:center;padding:40px var(--gap);font:400 var(--fs-md)/var(--lh) var(--sans);color:var(--dim)}

/* ══════════════ CONTROL: ANALYZER ROWS ══════════════ */
.grp-label{font:700 10px/1 var(--mono);letter-spacing:2px;color:var(--dim);
  text-transform:uppercase;padding:var(--gap-sm) 4px 6px}
.ac{display:flex;align-items:center;gap:12px;padding:var(--gap);min-height:72px;
  background:var(--surface);border-radius:var(--radius-sm);margin-bottom:2px;
  border-left:3px solid var(--border);cursor:pointer;transition:all .12s}
.ac.enabled{border-left-color:var(--accent-dim)}
.ac:active{background:var(--surface-2)}
.ac-info{flex:1;min-width:0}
.ac-name{font:600 var(--fs-md)/1.2 var(--sans)}
.ac.enabled .ac-name{color:var(--accent-dim)}
.ac.disabled .ac-name{color:var(--dim)}
.ac-desc{font:400 var(--fs-xs)/1.3 var(--sans);color:var(--dim);margin-top:2px}
.ac-fired{font:400 10px/1 var(--mono);color:var(--dim);margin-top:4px}
.tog{width:52px;height:30px;border-radius:15px;background:var(--border);position:relative;
  flex-shrink:0;transition:background .15s}
.tog.on{background:var(--accent-dim)}
.tog::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;
  border-radius:50%;background:var(--text);transition:transform .15s}
.tog.on::after{transform:translateX(22px);background:var(--bg)}

/* ══════════════ CONTROL: STATS ══════════════ */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:var(--gap)}
.sb{background:var(--surface);border-radius:var(--radius-sm);padding:12px 8px;text-align:center}
.sb-n{font:700 var(--fs-xl)/1 var(--mono);color:var(--accent)}
.sb-l{font:400 10px/1 var(--mono);color:var(--dim);letter-spacing:.5px;margin-top:4px}

/* ══════════════ CONTROL: COMMANDS ══════════════ */
.cmd{display:flex;gap:10px;padding:14px 4px;min-height:56px;
  border-bottom:1px solid var(--border);align-items:center}
.cmd:last-child{border-bottom:none}
.cmd-p{font:400 var(--fs-sm)/1 var(--mono);color:var(--accent-dim);white-space:nowrap;min-width:140px}
.cmd-d{font:400 var(--fs-sm)/var(--lh) var(--sans);color:var(--muted)}

/* ══════════════ CONTROL: BUTTONS ══════════════ */
.btn-danger{display:block;width:100%;font:700 var(--fs-sm)/1 var(--mono);letter-spacing:1px;
  padding:0;min-height:52px;border:1px solid rgba(255,69,58,.3);border-radius:var(--radius-sm);
  background:var(--danger-muted);color:var(--danger);text-align:center}
.btn-danger:active{background:rgba(255,69,58,.25)}

/* ══════════════ BOTTOM SHEET ══════════════ */
.sheet-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  align-items:flex-end;justify-content:center}
.sheet-bg.show{display:flex}
.sheet{width:100%;max-height:85vh;min-height:40vh;background:var(--surface);
  border-top:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;
  padding:12px var(--gap) calc(var(--nav-h) + var(--gap));overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.sheet-label{font:700 var(--fs-xs)/1 var(--mono);letter-spacing:1.5px;color:var(--dim);
  text-transform:uppercase;margin-bottom:4px}
.sheet-val{font:400 var(--fs-md)/var(--lh) var(--sans);color:var(--text);margin-bottom:14px}
.sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:var(--gap)}
.sheet-btn{min-height:52px;font:600 var(--fs-sm)/1 var(--mono);letter-spacing:.5px;
  border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);color:var(--muted);transition:all .12s}
.sheet-btn:active{background:var(--surface-2)}
.sheet-btn.primary{background:var(--accent-muted);border-color:var(--accent-dim);color:var(--accent)}

/* ══════════════ MODAL ══════════════ */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;
  align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;max-width:300px;width:90%;text-align:center}
.modal h3{font:700 var(--fs-md)/1 var(--mono);color:var(--danger);letter-spacing:1px;margin-bottom:12px}
.modal p{font:400 var(--fs-sm)/var(--lh) var(--sans);color:var(--muted);margin-bottom:16px}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;min-height:var(--tap);font:600 var(--fs-sm)/1 var(--mono);border-radius:var(--radius-sm)}
.m-cancel{background:var(--border);color:var(--text)}
.m-ok{background:var(--danger-muted);color:var(--danger);border:1px solid rgba(255,69,58,.4)}

/* ══════════════ QUICK ACTIONS SHEET ══════════════ */
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qa-btn{min-height:56px;font:600 var(--fs-sm)/1 var(--mono);letter-spacing:.5px;
  border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);color:var(--muted);transition:all .12s}
.qa-btn:active{background:var(--accent-muted);color:var(--accent);border-color:var(--accent-dim)}

/* ══════════════ CONNECTIONS TIMELINE ══════════════ */
.conn-view{display:none}.conn-view.show{display:block}
.conn-entity-filter{display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:var(--surface);border:1px solid var(--accent-dim);border-radius:var(--radius-sm);
  margin-bottom:var(--gap-sm);font:400 var(--fs-sm)/1 var(--mono);color:var(--accent)}
.conn-entity-filter button{font:600 var(--fs-sm)/1 var(--mono);color:var(--danger);min-width:var(--tap);
  min-height:32px;display:flex;align-items:center;justify-content:center}
.date-hdr{font:700 var(--fs-sm)/1 var(--mono);color:var(--muted);letter-spacing:1px;
  padding:var(--gap) 0 var(--gap-sm);text-transform:uppercase}
.cluster{background:var(--surface);border-left:2px dashed var(--accent-dim);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:12px 12px 12px 14px;
  margin-bottom:var(--gap-sm);margin-left:8px}
.cluster-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cluster-time{font:400 var(--fs-xs)/1 var(--mono);color:var(--dim)}
.cluster-topic{font:600 var(--fs-sm)/1 var(--sans);color:var(--accent-dim)}
.cluster-entities{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.cluster-entity{font:700 10px/1 var(--mono);padding:3px 8px;border-radius:10px;cursor:pointer;
  border:1px solid var(--border);transition:all .12s}
.cluster-entity:active{opacity:.6}
.cluster-items{display:flex;flex-direction:column;gap:2px}
.ci{display:flex;gap:8px;padding:8px;min-height:48px;border-radius:var(--radius-sm);
  background:var(--surface-2);align-items:flex-start;cursor:pointer}
.ci:active{opacity:.7}
.ci-text{flex:1;font:400 var(--fs-sm)/1.3 var(--sans);color:var(--text);min-width:0;
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.ci-rel{display:block;font:400 10px/1 var(--mono);color:var(--dim);margin-top:4px;padding-left:8px}

/* ══════════════ RESPONSIVE ══════════════ */
@media(min-width:430px){
  .kpi{grid-template-columns:repeat(4,1fr)}
  .kpi-cell{min-height:90px}
}
</style>
</head>
<body>
<div id="app">

<!-- ── TOPBAR ── -->
<div class="topbar">
  <span class="topbar-title" id="topbar-title">NOW</span>
  <div class="conn-pill"><div class="conn-dot" id="conn-dot"></div><span id="conn-text">CONNECTED</span></div>
</div>

<!-- ── CONTENT ── -->
<div id="content">

<!-- ═══ NOW ═══ -->
<div id="pg-now" class="page active">
  <div class="card status-card" id="status-card">
    <div class="status-left"><div class="status-dot live" id="s-dot"></div><span class="status-text" id="s-text">LISTENING</span></div>
    <span class="status-timer" id="s-timer">00:00</span>
  </div>
  <div class="kpi" id="kpi"></div>
  <div class="chips-scroll" id="achips"></div>
  <div class="sh"><span class="sh-t">Activity</span><span class="sh-badge" id="feed-ct"></span><span class="sh-line"></span></div>
  <div class="feed" id="feed"></div>
  <div class="empty" id="feed-empty">Listening &mdash; start a conversation</div>
</div>

<!-- ═══ LIBRARY ═══ -->
<div id="pg-library" class="page">
  <div class="search-bar">
    <div class="search-wrap">
      <input class="search" id="q" type="text" placeholder="Search memory..." autocomplete="off"/>
      <button class="search-x" id="qx">&times;</button>
    </div>
    <div class="filters" id="filters"></div>
  </div>
  <div id="mlist"></div>
  <div class="conn-view" id="conn-view"></div>
  <div class="empty" id="m-empty">No items yet</div>
</div>

<!-- ═══ CONTROL ═══ -->
<div id="pg-control" class="page">
  <div class="sh"><span class="sh-t">Analyzers</span><span class="sh-badge" id="a-badge"></span><span class="sh-line"></span></div>
  <div id="a-cards"></div>
  <div class="sh"><span class="sh-t">Session</span><span class="sh-line"></span></div>
  <div class="sg" id="c-stats"></div>
  <div class="sh"><span class="sh-t">Voice Commands</span><span class="sh-line"></span></div>
  <div id="cmds"></div>
  <div class="sh" style="margin-top:var(--gap)"><span class="sh-t" style="color:var(--danger)">Danger Zone</span><span class="sh-line"></span></div>
  <button class="btn-danger" id="end-btn">FORGET ALL MEMORY</button>
</div>

</div><!-- #content -->

<!-- ── FAB ── -->
<button class="fab" id="fab">FACT CHECK</button>

<!-- ── NAV ── -->
<div id="nav">
  <button class="nav-btn active" data-pg="now"><span class="nav-icon">&#9679;</span>NOW</button>
  <button class="nav-btn" data-pg="library"><span class="nav-icon">&#9776;</span>LIBRARY</button>
  <button class="nav-btn" data-pg="control"><span class="nav-icon">&#9881;</span>CONTROL</button>
</div>
</div><!-- #app -->

<!-- SHEETS -->
<div class="sheet-bg" id="detail-bg"><div class="sheet"><div class="sheet-handle"></div><div id="detail-body"></div></div></div>
<div class="sheet-bg" id="qa-bg"><div class="sheet"><div class="sheet-handle"></div><div class="sh"><span class="sh-t">Quick Actions</span><span class="sh-line"></span></div><div class="qa-grid" id="qa-grid"></div></div></div>
<div class="modal-bg" id="modal"><div class="modal"><h3>FORGET ALL MEMORY</h3><p>This erases all stored commitments, decisions, entities, and session data permanently.</p><div class="modal-btns"><button class="m-cancel" id="m-no">CANCEL</button><button class="m-ok" id="m-yes">FORGET</button></div></div></div>

<!-- GLASSES LOGIC -->
<script type="module" src="/src/main.ts"></script>

<!-- PHONE UI -->
<script>
(function(){
"use strict";

/* ── META ── */
var ANA={
  factValidation:{d:"FACT VALID",desc:"Validates claims via web search",g:"consistency",k:""},
  commitments:{d:"COMMITMENTS",desc:"Tracks promises and deadlines",g:"capture",k:"commitments"},
  decisions:{d:"DECISIONS",desc:"Captures explicit decisions",g:"capture",k:"decisions"},
  intent:{d:"INTENT",desc:"Classifies persuasion and deflection",g:"behavior",k:"intent"},
  hedging:{d:"HEDGING",desc:"Scores evasive language",g:"behavior",k:"hedging"},
  stressCues:{d:"STRESS CUES",desc:"Monitors delivery patterns",g:"behavior",k:"stress"},
  topicShift:{d:"TOPIC SHIFT",desc:"Detects conversation pivots",g:"consistency",k:"topic"},
  contradiction:{d:"CONTRADICTION",desc:"Flags conflicting statements",g:"consistency",k:"contradiction"}
};
var GROUPS=[{id:"capture",l:"CAPTURE"},{id:"behavior",l:"BEHAVIOR"},{id:"consistency",l:"CONSISTENCY"}];
var CMDS=[
  ["even check","Fact-check last claim"],["even why","Explain last result"],
  ["even recall","Search session memory"],["even commitments","List commitments"],
  ["even decisions","List decisions"],["even summary","Session summary"],
  ["even stats","Session statistics"],["even status","Analyzer status on glasses"],
  ["even toggle [name]","Toggle an analyzer"],["even forget","Clear all memory"],
  ["even help","Commands list on glasses"]
];
var QA=[
  {l:"FACT CHECK",p:"even check"},{l:"RECALL",p:"even recall"},
  {l:"SUMMARY",p:"even summary"},{l:"WHY",p:"even why"},
  {l:"STATS",p:"even stats"},{l:"HELP",p:"even help"}
];
var FILTERS=[
  {id:"all",l:"ALL"},{id:"connections",l:"CONNECTIONS"},{id:"commitment",l:"COMMITS"},{id:"decision",l:"DECISIONS"},
  {id:"entity",l:"ENTITIES"},{id:"pinned",l:"PINNED"},{id:"contradiction",l:"CONFLICTS"}
];
var TB={commitment:"b-commit",decision:"b-decision",entity:"b-entity",pinned:"b-pinned",contradiction:"b-contra"};
var EB={PERSON:"b-person",DATE:"b-date",NUMBER:"b-number",PLACE:"b-place",ORGANIZATION:"b-org"};
var CB={HIGH:"b-high",MED:"b-med",LOW:"b-low"};
var MC={ALERT:"alert",CARD:"card-t",COMPACT:"card-t",PASSIVE:"passive"};

/* ── STATE ── */
var curFilter="all",searchQ="",lastVer=0,fired={},connEntityFilter="";

/* ── HELPERS ── */
function esc(s){var d=document.createElement("div");d.textContent=s||"";return d.innerHTML}
function rel(ts){if(!ts)return"";var d=Math.floor((Date.now()-ts)/1000);if(d<60)return d+"s";if(d<3600)return Math.floor(d/60)+"m";return Math.floor(d/3600)+"h"}
function dur(ms){var s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);return(h?String(h).padStart(2,"0")+":":"")+String(m%60).padStart(2,"0")+":"+String(s%60).padStart(2,"0")}
function fire(p){window.dispatchEvent(new CustomEvent("validateai-trigger",{detail:{phrase:p}}))}

/* ── KEYBOARD INSET ── */
if(window.visualViewport){var vv=window.visualViewport;vv.addEventListener("resize",function(){
  var inset=Math.max(0,window.innerHeight-vv.height-vv.offsetTop);
  document.documentElement.style.setProperty("--kb-inset",inset+"px");
})}

/* ── NAV ── */
var navBtns=document.querySelectorAll(".nav-btn"),pages=document.querySelectorAll(".page"),
    titles={now:"NOW",library:"LIBRARY",control:"CONTROL"},titleEl=document.getElementById("topbar-title");
navBtns.forEach(function(n){n.addEventListener("click",function(){
  navBtns.forEach(function(x){x.classList.remove("active")});pages.forEach(function(p){p.classList.remove("active")});
  n.classList.add("active");document.getElementById("pg-"+n.dataset.pg).classList.add("active");
  titleEl.textContent=titles[n.dataset.pg]||"";
})});

/* ── FAB ── */
document.getElementById("fab").addEventListener("click",function(){fire("even check")});
document.getElementById("fab").addEventListener("contextmenu",function(e){e.preventDefault();openQA()});

/* ── QUICK ACTIONS SHEET ── */
var qaBg=document.getElementById("qa-bg"),qaGrid=document.getElementById("qa-grid");
function openQA(){
  var h="";QA.forEach(function(q){h+='<button class="qa-btn" data-p="'+q.p+'">'+q.l+'</button>'});
  qaGrid.innerHTML=h;
  qaGrid.querySelectorAll(".qa-btn").forEach(function(b){b.addEventListener("click",function(){fire(b.dataset.p);qaBg.classList.remove("show")})});
  qaBg.classList.add("show");
}
qaBg.addEventListener("click",function(e){if(e.target===qaBg)qaBg.classList.remove("show")});

/* ── SEARCH ── */
var qEl=document.getElementById("q"),qxEl=document.getElementById("qx");
qEl.addEventListener("input",function(){searchQ=qEl.value.toLowerCase();qxEl.classList.toggle("show",searchQ.length>0)});
qxEl.addEventListener("click",function(){qEl.value="";searchQ="";qxEl.classList.remove("show");qEl.focus()});

/* ── FILTERS ── */
var filtersEl=document.getElementById("filters");
(function(){var h="";FILTERS.forEach(function(f){h+='<button class="fchip'+(f.id==="all"?" active":"")+'" data-f="'+f.id+'">'+f.l+'</button>'});filtersEl.innerHTML=h;
  filtersEl.querySelectorAll(".fchip").forEach(function(c){c.addEventListener("click",function(){
    filtersEl.querySelectorAll(".fchip").forEach(function(x){x.classList.remove("active")});c.classList.add("active");curFilter=c.dataset.f;
  })});
})();

/* ── MODAL ── */
var modalEl=document.getElementById("modal");
document.getElementById("end-btn").addEventListener("click",function(){modalEl.classList.add("show")});
document.getElementById("m-no").addEventListener("click",function(){modalEl.classList.remove("show")});
document.getElementById("m-yes").addEventListener("click",function(){modalEl.classList.remove("show");fire("even forget")});

/* ── DETAIL SHEET ── */
var detBg=document.getElementById("detail-bg"),detBody=document.getElementById("detail-body");
detBg.addEventListener("click",function(e){if(e.target===detBg)detBg.classList.remove("show")});
function openDetail(html){detBody.innerHTML=html;detBg.classList.add("show")}

/* ── RENDER: NOW ── */
function rNow(S){
  var st=S.status||"IDLE",dot=document.getElementById("s-dot"),tx=document.getElementById("s-text");
  dot.className="status-dot"+(st==="LISTENING"?" live":" idle");
  tx.textContent=st;tx.className="status-text"+(st==="LISTENING"?"":" idle");
  document.getElementById("s-timer").textContent=dur(Date.now()-(S.stats&&S.stats.sessionStartTs||Date.now()));

  var ss=S.stats||{};
  document.getElementById("kpi").innerHTML=
    '<div class="kpi-cell"><div class="kpi-n">'+(ss.factsChecked||0)+'</div><div class="kpi-l">FACTS</div></div>'+
    '<div class="kpi-cell"><div class="kpi-n">'+(ss.commitments||0)+'</div><div class="kpi-l">COMMITS</div></div>'+
    '<div class="kpi-cell"><div class="kpi-n">'+(ss.decisions||0)+'</div><div class="kpi-l">DECISIONS</div></div>'+
    '<div class="kpi-cell"><div class="kpi-n">'+(ss.entities||0)+'</div><div class="kpi-l">ENTITIES</div></div>';

  var dis=S.activeAnalyzers||[],ch="";
  Object.keys(ANA).forEach(function(k){var a=ANA[k],off=dis.indexOf(k)!==-1;
    ch+='<button class="achip '+(off?"":"on")+'" data-tk="'+a.k+'" data-tn="'+k+'">'+a.d+'</button>'});
  document.getElementById("achips").innerHTML=ch;
  document.getElementById("achips").querySelectorAll(".achip").forEach(function(c){c.addEventListener("click",function(){if(c.dataset.tk)fire("even toggle "+c.dataset.tk)})});

  var outs=(S.recentOutputs||[]).filter(function(o){return o.triggered});
  outs.sort(function(a,b){var r={ALERT:3,CARD:2,COMPACT:2,PASSIVE:1};return(r[b.suggestedHudMode]||0)-(r[a.suggestedHudMode]||0)});
  outs=outs.slice(0,5);
  document.getElementById("feed-ct").textContent=outs.length?outs.length+"":"";
  var fE=document.getElementById("feed-empty"),fL=document.getElementById("feed");
  if(!outs.length){fL.innerHTML="";fE.style.display=""}
  else{fE.style.display="none";var fh="";
    outs.forEach(function(o){var cls=MC[o.suggestedHudMode]||"passive",bc=CB[o.confidence]||"b-low";
      fh+='<div class="fi '+cls+'"><div class="fi-content"><div class="fi-title">'+esc(o.title)+'</div><div class="fi-summary">'+esc(o.summary)+'</div><div class="fi-meta"><span class="b '+bc+'">'+esc(o.confidence)+'</span><span>'+esc(o.analyzer)+'</span></div></div></div>'});
    fL.innerHTML=fh}
}

/* ── RENDER: LIBRARY ── */
function rLib(S){
  var connView=document.getElementById("conn-view"),mL=document.getElementById("mlist"),mE=document.getElementById("m-empty");
  if(curFilter==="connections"){mL.style.display="none";mE.style.display="none";connView.classList.add("show");rConn(S);return}
  connView.classList.remove("show");mL.style.display="";

  var items=[];
  (S.commitments||[]).forEach(function(c){items.push({t:"commitment",text:c.text,owner:c.owner,due:c.dueDate,ts:c.ts,raw:c})});
  (S.decisions||[]).forEach(function(d){items.push({t:"decision",text:d,ts:0,raw:d})});
  (S.entities||[]).forEach(function(e){items.push({t:"entity",text:e.text,et:e.type,ctx:e.context,ts:e.ts,raw:e})});
  (S.pinned||[]).forEach(function(p){items.push({t:"pinned",text:p.text,src:p.source,ts:p.ts,raw:p})});
  if(curFilter==="contradiction") items=items.filter(function(i){return i.t==="pinned"&&(i.src||"").indexOf("contradiction")!==-1});
  else if(curFilter!=="all") items=items.filter(function(i){return i.t===curFilter});
  if(searchQ) items=items.filter(function(i){return(i.text||"").toLowerCase().indexOf(searchQ)!==-1||(i.owner||"").toLowerCase().indexOf(searchQ)!==-1||(i.ctx||"").toLowerCase().indexOf(searchQ)!==-1});
  items.sort(function(a,b){return(b.ts||0)-(a.ts||0)});

  var eMsg={all:"No items yet",commitment:"No commitments yet",decision:"No decisions yet",entity:"No entities yet",pinned:"No pinned items yet",contradiction:"No contradictions yet"};
  mE.textContent=eMsg[curFilter]||"No items yet";
  if(!items.length){mL.innerHTML="";mE.style.display="";return}
  mE.style.display="none";
  var h="";
  items.forEach(function(it,idx){
    var badge=it.t==="entity"?(EB[it.et]||"b-entity"):(TB[it.t]||"b-entity");
    var label=it.t==="entity"?(it.et||"ENTITY"):it.t.toUpperCase();
    var meta=[];
    if(it.owner) meta.push(esc(it.owner));
    if(it.due) meta.push('<span class="ml-due">by '+esc(it.due)+'</span>');
    if(it.ctx) meta.push(esc(it.ctx));
    if(it.ts) meta.push(rel(it.ts));
    h+='<div class="ml" data-i="'+idx+'"><span class="b '+badge+'" style="margin-top:3px">'+label+'</span><div class="ml-body"><div class="ml-text">'+esc(it.text)+'</div>'+(meta.length?'<div class="ml-meta">'+meta.join(' &middot; ')+'</div>':'')+'</div></div>';
  });
  mL.innerHTML=h;
  mL.querySelectorAll(".ml").forEach(function(el){el.addEventListener("click",function(){
    var it=items[parseInt(el.dataset.i)];if(!it)return;
    var sh='<div class="sheet-label">TYPE</div><div class="sheet-val"><span class="b '+(TB[it.t]||"b-entity")+'">'+esc(it.t.toUpperCase())+'</span></div>';
    sh+='<div class="sheet-label">CONTENT</div><div class="sheet-val">'+esc(it.text)+'</div>';
    if(it.owner)sh+='<div class="sheet-label">OWNER</div><div class="sheet-val">'+esc(it.owner)+'</div>';
    if(it.due)sh+='<div class="sheet-label">DUE DATE</div><div class="sheet-val">'+esc(it.due)+'</div>';
    if(it.et)sh+='<div class="sheet-label">ENTITY TYPE</div><div class="sheet-val">'+esc(it.et)+'</div>';
    if(it.ctx)sh+='<div class="sheet-label">CONTEXT</div><div class="sheet-val">'+esc(it.ctx)+'</div>';
    if(it.src)sh+='<div class="sheet-label">SOURCE</div><div class="sheet-val">'+esc(it.src)+'</div>';
    if(it.ts)sh+='<div class="sheet-label">TIMESTAMP</div><div class="sheet-val">'+new Date(it.ts).toLocaleString()+'</div>';
    openDetail(sh);
  })});
}

/* ── RENDER: CONNECTIONS ── */
function rConn(S){
  var cv=document.getElementById("conn-view"),mE=document.getElementById("m-empty");
  // Build flat artifact list with timestamps
  var all=[];
  (S.commitments||[]).forEach(function(c){all.push({t:"commitment",text:c.text,owner:c.owner,due:c.dueDate,ts:c.ts})});
  (S.decisions||[]).forEach(function(d){all.push({t:"decision",text:d,ts:0})});
  (S.entities||[]).forEach(function(e){all.push({t:"entity",text:e.text,et:e.type,ctx:e.context,ts:e.ts})});
  (S.pinned||[]).forEach(function(p){all.push({t:"pinned",text:p.text,src:p.source,ts:p.ts})});
  all=all.filter(function(a){return a.ts>0});
  all.sort(function(a,b){return a.ts-b.ts});
  if(!all.length){cv.innerHTML="";mE.style.display="";mE.textContent="Relationships appear as conversations develop.\nCommitments, decisions, and entities will be linked here automatically.";return}
  mE.style.display="none";

  // Extract entity names from all artifacts for linking
  var entNames=[];
  (S.entities||[]).forEach(function(e){if(e.text)entNames.push(e.text.toLowerCase())});
  // Also add owners
  (S.commitments||[]).forEach(function(c){if(c.owner)entNames.push(c.owner.toLowerCase())});
  entNames=[].concat(Array.from(new Set(entNames)));

  // Group into 10-minute clusters
  var clusters=[],curCluster=null;
  all.forEach(function(a){
    if(!curCluster||a.ts-curCluster.end>600000){
      curCluster={start:a.ts,end:a.ts,items:[a],entities:new Set()};clusters.push(curCluster);
    }else{curCluster.items.push(a);curCluster.end=a.ts}
    // Find shared entities in this item
    var txt=(a.text||"").toLowerCase()+" "+(a.owner||"").toLowerCase()+" "+(a.ctx||"").toLowerCase();
    entNames.forEach(function(en){if(txt.indexOf(en)!==-1)curCluster.entities.add(en)});
  });

  // Apply entity filter
  if(connEntityFilter){
    var lf=connEntityFilter.toLowerCase();
    clusters=clusters.filter(function(c){return c.entities.has(lf)});
  }

  // Group clusters by date
  var dateGroups={};
  clusters.forEach(function(c){
    var d=new Date(c.start),today=new Date(),yest=new Date(today);yest.setDate(yest.getDate()-1);
    var key;
    if(d.toDateString()===today.toDateString()) key="TODAY";
    else if(d.toDateString()===yest.toDateString()) key="YESTERDAY";
    else key=d.toLocaleDateString(undefined,{month:"short",day:"numeric"});
    if(!dateGroups[key])dateGroups[key]=[];
    dateGroups[key].push(c);
  });

  // Entity badge color map
  var entBadge=function(name){
    var e=(S.entities||[]).find(function(x){return x.text&&x.text.toLowerCase()===name.toLowerCase()});
    if(!e)return"b-entity";return EB[e.type]||"b-entity";
  };

  var h="";
  // Entity filter indicator
  if(connEntityFilter){
    h+='<div class="conn-entity-filter">Showing: '+esc(connEntityFilter)+'<button id="conn-clear-entity">&times;</button></div>';
  }

  var keys=Object.keys(dateGroups);
  if(!keys.length){cv.innerHTML="";mE.style.display="";mE.textContent="No connections found"+(connEntityFilter?" for "+connEntityFilter:"");return}

  keys.forEach(function(dk){
    h+='<div class="date-hdr">'+esc(dk)+'</div>';
    dateGroups[dk].forEach(function(c){
      var t0=new Date(c.start),t1=new Date(c.end);
      var timeRange=t0.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
      if(c.end-c.start>60000) timeRange+=" \u2013 "+t1.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});

      // Detect dominant topic from first commitment or decision
      var topic="";
      for(var ti=0;ti<c.items.length;ti++){if(c.items[ti].t==="commitment"||c.items[ti].t==="decision"){topic=c.items[ti].text.slice(0,40);break}}

      h+='<div class="cluster"><div class="cluster-hdr"><span class="cluster-time">'+esc(timeRange)+'</span>';
      if(topic)h+='<span class="cluster-topic">'+esc(topic)+'</span>';
      h+='</div>';

      // Entity pills
      if(c.entities.size>0){
        h+='<div class="cluster-entities">';
        c.entities.forEach(function(en){h+='<button class="cluster-entity '+entBadge(en)+'" data-entity="'+esc(en)+'">'+esc(en)+'</button>'});
        h+='</div>';
      }

      // Items with relationship labels
      h+='<div class="cluster-items">';
      var prev=null;
      c.items.forEach(function(it){
        var badge=it.t==="entity"?(EB[it.et]||"b-entity"):(TB[it.t]||"b-entity");
        var label=it.t==="entity"?(it.et||"ENTITY"):it.t.toUpperCase();
        // Relationship label between items
        if(prev){
          var rl="";
          if(prev.t==="decision"&&it.t==="commitment") rl="followed by";
          else if(prev.t==="commitment"&&it.t==="decision") rl="led to";
          else if(it.t==="pinned"&&(it.src||"").indexOf("contradiction")!==-1) rl="contradicts";
          else rl="related to";
          h+='<span class="ci-rel">\u2514 '+rl+'</span>';
        }
        h+='<div class="ci"><span class="b '+badge+'">'+label+'</span><div class="ci-text">'+esc(it.text)+'</div></div>';
        prev=it;
      });
      h+='</div></div>';
    });
  });

  cv.innerHTML=h;

  // Entity pivot click handlers
  cv.querySelectorAll(".cluster-entity").forEach(function(el){
    el.addEventListener("click",function(){connEntityFilter=el.dataset.entity||"";});
  });
  // Clear entity filter
  var clearBtn=document.getElementById("conn-clear-entity");
  if(clearBtn)clearBtn.addEventListener("click",function(){connEntityFilter="";});
}

/* ── RENDER: CONTROL ── */
function rCtrl(S){
  var dis=S.activeAnalyzers||[];
  document.getElementById("a-badge").textContent=S.analyzerBadge||"";
  var h="";
  GROUPS.forEach(function(g){h+='<div class="grp-label">'+g.l+'</div>';
    Object.keys(ANA).forEach(function(k){var a=ANA[k];if(a.g!==g.id)return;
      var off=dis.indexOf(k)!==-1,cls=off?"disabled":"enabled",fc=fired[k]||0;
      h+='<div class="ac '+cls+'" data-tk="'+a.k+'"><div class="ac-info"><div class="ac-name">'+a.d+'</div><div class="ac-desc">'+a.desc+'</div>';
      if(fc>0)h+='<div class="ac-fired">fired '+fc+'x</div>';
      h+='</div><div class="tog '+(off?"":"on")+'"></div></div>'});
  });
  document.getElementById("a-cards").innerHTML=h;
  document.querySelectorAll(".ac[data-tk]").forEach(function(el){el.addEventListener("click",function(){if(el.dataset.tk)fire("even toggle "+el.dataset.tk)})});

  var ss=S.stats||{},el=Date.now()-(ss.sessionStartTs||Date.now());
  document.getElementById("c-stats").innerHTML=
    '<div class="sb"><div class="sb-n">'+(ss.factsChecked||0)+'</div><div class="sb-l">FACTS</div></div>'+
    '<div class="sb"><div class="sb-n">'+(ss.commitments||0)+'</div><div class="sb-l">COMMITS</div></div>'+
    '<div class="sb"><div class="sb-n">'+(ss.decisions||0)+'</div><div class="sb-l">DECISIONS</div></div>'+
    '<div class="sb"><div class="sb-n">'+(ss.entities||0)+'</div><div class="sb-l">ENTITIES</div></div>'+
    '<div class="sb"><div class="sb-n">'+(ss.contradictions||0)+'</div><div class="sb-l">CONFLICTS</div></div>'+
    '<div class="sb"><div class="sb-n">'+Math.floor(el/60000)+'</div><div class="sb-l">MINUTES</div></div>';

  var cEl=document.getElementById("cmds");
  if(!cEl.hasChildNodes()){var ch="";CMDS.forEach(function(c){ch+='<div class="cmd"><span class="cmd-p">'+esc(c[0])+'</span><span class="cmd-d">'+esc(c[1])+'</span></div>'});cEl.innerHTML=ch}
}

/* ── POLL ── */
function countFired(S){var c={};(S.recentOutputs||[]).forEach(function(o){if(o.triggered)c[o.analyzer]=(c[o.analyzer]||0)+1});fired=c}

setInterval(function(){
  var S=window.validateAIState;
  if(!S){document.getElementById("s-text").textContent="CONNECTING...";return}
  if(S.version===lastVer)return;
  lastVer=S.version||0;
  countFired(S);rNow(S);rLib(S);rCtrl(S);
},250);

})();
</script>
</body>
</html>
